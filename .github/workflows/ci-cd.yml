name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.RENDER_DEPLOY_HOOK_URL != ''
    steps:
      - name: Trigger Render deploy
        run: |
          echo "Triggering Render deployment..."
          curl -s "${{ vars.RENDER_DEPLOY_HOOK_URL }}" || true
          echo "Deploy triggered. Render will build and deploy automatically."

  deploy-vercel:
    name: Deploy to Vercel
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCELTOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCELORGID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCELPROJECTID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        working-directory: frontend

      - name: Build with Vercel
        run: vercel build --prod --token=$VERCEL_TOKEN
        working-directory: frontend

      - name: Deploy to Vercel
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "Deployed to: $URL"
        working-directory: frontend

  health-check:
    name: Backend Health Check
    needs: [deploy-render]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Wait for deploy and check health
        run: |
          echo "Waiting 120s for Render to deploy..."
          sleep 120
          echo "Checking backend health..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 \
              https://violence-detection-service.onrender.com/health) || true
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (HTTP 200)"
              curl -s https://violence-detection-service.onrender.com/health | jq .
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 60s..."
            sleep 60
          done
          echo "::warning::Backend health check failed — Render may still be deploying"

  notify-failure:
    name: Notify on Failure
    needs: [build-frontend, deploy-vercel]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Report failure
        run: |
          echo "::error::CI/CD pipeline failed!"
          echo ""
          echo "Failed jobs summary:"
          echo "- Build Frontend: ${{ needs.build-frontend.result }}"
          echo "- Deploy Vercel: ${{ needs.deploy-vercel.result }}"
