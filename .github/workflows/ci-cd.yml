name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  health-check:
    name: Backend Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          echo "Waking up Render backend..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 \
              https://violence-detection-service.onrender.com/health) || true
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (HTTP 200)"
              curl -s https://violence-detection-service.onrender.com/health | jq .
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 30s..."
            sleep 30
          done
          echo "::error::Backend health check failed after 3 attempts"
          exit 1

  deploy-vercel:
    name: Deploy to Vercel
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          working-directory: frontend

  notify-failure:
    name: Notify on Failure
    needs: [build-frontend, health-check, deploy-vercel]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Report failure
        run: |
          echo "::error::CI/CD pipeline failed!"
          echo ""
          echo "Failed jobs summary:"
          echo "- Build Frontend: ${{ needs.build-frontend.result }}"
          echo "- Health Check: ${{ needs.health-check.result }}"
          echo "- Deploy Vercel: ${{ needs.deploy-vercel.result }}"
